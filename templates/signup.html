{% extends "base.html" %}

{% block title %}Signup - Smart Health{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="glass-card auth-card">
    <h1>SMART HEALTH</h1>

    {% if error %}
      <p style="color: #e74c3c; margin-bottom: 15px;">{{ error }}</p>
    {% endif %}

    <form method="POST">
      <div class="input-group">
        <label>Full Name</label>
        <input type="text" name="name" class="input-control" placeholder="Enter your full name" required>
      </div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" name="email" class="input-control" placeholder="Enter your email" required>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" name="password" class="input-control" placeholder="Enter password" required>
      </div>
      
      <div class="input-group">
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" class="input-control" placeholder="Confirm password" required>
      </div>

      <button type="submit" class="btn">Signup</button>
    </form>

    <p class="switch">
      Already have an account?
      <a href="{{ url_for('login') }}">Login</a>
    </p>
  </div>
</div>
{% endblock %}
